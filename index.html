<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>INS News Ticker</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#1b1b1b;
    font-family:Arial, Helvetica, sans-serif;
}

/* =========================
   MAIN TICKER
========================= */

.ticker{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:60px;
    display:flex;
    overflow:hidden;
    background:#222;
    border-top:2px solid #444;
}

/* =========================
   INS LOGO
========================= */

.live{
    width:500px;
    background:linear-gradient(to bottom,#d10000,#970000);
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    flex-shrink:0;
    border-right:2px solid rgba(255,255,255,.15);
}

.live .title{
    font-size:30px;
    font-weight:900;
    letter-spacing:2px;
}

.live .subtitle{
    font-size:15px;
    letter-spacing:3px;
    opacity:.95;
}

/* =========================
   BULLETIN
========================= */

.breaking{
    background:#111;
    color:white;
    padding:0 22px;
    display:flex;
    align-items:center;
    font-size:17px;
    font-weight:bold;
    white-space:nowrap;
    border-right:2px solid rgba(255,255,255,.12);
}

/* =========================
   SCROLLING NEWS
========================= */

.news{
    flex:1;
    overflow:hidden;
    display:flex;
    align-items:center;
    background:#2a2a2a;
    color:white;
}

.news span{
    white-space:nowrap;
    display:inline-block;
    padding-left:100%;
    animation:scroll 30s linear infinite;
    font-size:18px;
    font-weight:600;
    letter-spacing:.5px;
}

@keyframes scroll{
    from{
        transform:translateX(0);
    }
    to{
        transform:translateX(-100%);
    }
}

</style>

</head>

<body>

<div class="ticker">

    <div class="live">
        <div class="title">INTERSTATE NEWS SERVICE</div>
        <div class="subtitle">RIVERSIDE CITY SESSION STATUS</div>
    </div>

    <div class="breaking">
        BULLETIN
    </div>

    <div class="news">
        <span>
        SESSION OFFLINE • SESSION AT 6PM GMT • SESSION OFFLINE • SESSION AT 6PM GMT • SESSION OFFLINE • SESSION AT 6PM GMT •
        </span>
    </div>

</div>

</body>
</html>
