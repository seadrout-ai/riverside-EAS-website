<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>News Ticker</title>

<style>

body{
    margin:0;
    background:#1b1b1b;
    font-family:Arial, Helvetica, sans-serif;
}

.ticker{
    position:fixed;
    bottom:0;
    width:100%;
    height:55px;
    display:flex;
    overflow:hidden;
}

.live{
    background:#cc0000;
    color:white;
    font-weight:bold;
    display:flex;
    align-items:center;
    justify-content:center;
    width:250px;
    font-size:20px;
    flex-shrink:0;
}

.breaking{
    background:#111;
    color:white;
    font-weight:bold;
    display:flex;
    align-items:center;
    padding:0 20px;
    font-size:18px;
    flex-shrink:0;
}

.news{
    background:#222;
    color:white;
    overflow:hidden;
    flex:1;
    display:flex;
    align-items:center;
}

.news span{
    white-space:nowrap;
    display:inline-block;
    padding-left:100%;
    animation:ticker 25s linear infinite;
    font-size:18px;
}

@keyframes ticker{
    from{
        transform:translateX(0);
    }
    to{
        transform:translateX(-100%);
    }
}

</style>

</head>

<body>

<div class="ticker">

<div class="live">
INTERSTATE NEWS SERVICE
</div>

<div class="breaking">
BULLETIN OF INS
</div>

<div class="news">
<span>
Court Case #001 • LIVE • STATE OF TEXAS vs. STATE OF TEXAS • DEPARTMENT OF JUSTICE, ALAMO COUNTY AREA •
</span>
</div>

</div>

</body>
</html>
